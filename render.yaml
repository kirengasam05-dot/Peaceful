databases:
  - name: peaceful-nights-db
    databaseName: peaceful_nights
    user: peaceful_nights

services:
  - type: web
    name: peaceful-nights-guide
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_USERNAME
        sync: false           # set this in the Render dashboard
      - key: ADMIN_PASSWORD
        sync: false           # set this in the Render dashboard
      - key: DATABASE_URL     # provided automatically by the database above
        fromDatabase:
          name: peaceful-nights-db
          property: connectionString
