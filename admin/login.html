<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Peaceful Nights Guide</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="center">
        <div class="brand-mark" style="color: var(--accent); display: inline-grid; place-items: center; width: 48px; height: 48px;">
          <svg width="40" height="40" viewBox="0 0 28 28" fill="none"><path d="M22 16a8 8 0 0 1-10-10 8 8 0 1 0 10 10z" fill="currentColor"/></svg>
        </div>
        <h1 style="font-size: 1.8rem; margin: 16px 0 4px;">Welcome back</h1>
        <p class="muted" style="margin-bottom: 28px;">Sign in to manage your store</p>
      </div>
      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Sign in</button>
        <p id="error" style="color: #B23A3A; font-size: .9rem; margin-top: 12px; display:none;">Invalid username or password.</p>
      </form>
      <p class="muted center" style="font-size:.8rem; margin-top: 24px;">
        Default: <code>admin</code> / <code>peacefulnights2025</code><br>
        Change this in <code>assets/js/admin.js</code>
      </p>
    </div>
  </div>
  <script src="../assets/js/admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (adminLogin(u, p)) {
        location.href = 'dashboard.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    });
    // If already logged in, redirect
    if (isAdminLoggedIn()) location.href = 'dashboard.html';
  </script>
</body>
</html>
