    <circle cx="480" cy="70" r="1.6"/>
    <circle cx="610" cy="140" r="1"/>
    <circle cx="700" cy="90" r="2.2"/>
    <circle cx="120" cy="220" r="1"/>
    <circle cx="540" cy="200" r="1.4"/>
    <circle cx="730" cy="240" r="1"/>
